# Frontier — full stack in one command.
#
#   docker compose up --build      (or: ./run.sh)
#
# Only the gateway is published to the host. The frontend and backend talk to
# each other over the internal compose network and are reachable from the
# outside world exclusively through the gateway (and therefore through a single
# tunnel URL).

services:
  backend:
    build: ./backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # SQLite DB on a persistent named volume (auto-created & seeded on first run).
      ConnectionStrings__BlogDb: "Data Source=/data/blog.db"
      # JWT signing/validation key — override in .env for anything non-local.
      Auth__Key: "${AUTH_KEY:-frontier-dev-only-change-me-to-a-long-random-secret-0123456789}"
      Auth__Issuer: BlogApi
      Auth__Audience: BlogApiClients
      # Empty => allow any origin (demo). Comma-separated list to lock down.
      Cors__AllowedOrigins: "${CORS_ALLOWED_ORIGINS:-}"
    volumes:
      - backend-db:/data
      - backend-uploads:/app/wwwroot/images/posts
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NODE_ENV: production
      # Server-side calls go straight to the backend over the internal network.
      API_INTERNAL_URL: http://backend:8080
      # Empty => image URLs are relative and resolve against the gateway/tunnel origin.
      NEXT_PUBLIC_IMAGE_BASE_URL: ""
    depends_on:
      - backend
    restart: unless-stopped

  gateway:
    image: caddy:2-alpine
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  backend-db:
  backend-uploads:
  caddy-data:
  caddy-config:
